<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Koleksi Iyann</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        /* Navigasi */
        nav {
            background: #222;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            color: #bbb;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
        }
        nav a:hover {
            color: white;
        }

        /* Container Utama */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            color: #222;
        }

        /* Grid Foto */
        .gallery-grid {
            display: grid;
            /* Membuat 3 kolom di layar besar, otomatis menyesuaikan di layar kecil */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03); /* Efek sedikit membesar saat kursor lewat */
        }

        .gallery-item img {
            width: 100%;
            height: 200px; /* Tinggi seragam agar rapi */
            object-fit: cover; /* Foto tidak gepeng, akan terpotong rapi di tengah */
            border-radius: 6px;
        }

        .caption {
            margin-top: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html" style="color: white; border-bottom: 2px solid white; padding-bottom: 5px;">Gallery</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h1>Koleksi Foto</h1>

        <div class="gallery-grid">
            
            <div class="gallery-item">
                <img src="Mobile legends Classic game play 🙇.jpg" alt="Foto 1">
                <div class="caption">Momen Main Game 1</div>
            </div>

            <div class="gallery-item">
                <img src="ace.jpg" alt="Foto 2">
                <div class="caption">Momen Main Game 2</div>
            </div>

            <div class="gallery-item">
                <img src="coding.jpg" alt="Foto 3">
                <div class="caption">Setup Coding</div>
            </div>

            <div class="gallery-item">
                <img src="fakultas-teknik-universitas-sam-ratulangi-manado-jfgjfgj76867.jpg" alt="Foto 4">
                <div class="caption">Kampus Informatika</div>
            </div>

            <div class="gallery-item">
                <img src="Bioskop.jpg" alt="Foto 5">
                <div class="caption">Kegiatan Lainnya</div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Iyann &bull; Informatika Universitas Sam Ratulangi</p>
    </footer>

</body>
</html>
